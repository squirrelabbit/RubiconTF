syntax = "proto3";
package alpha_encode;

service AlphaStandardGRPCFunction {
  rpc rpcAlphaStandardGRPCFunction (request) returns (response) {}
}

message request {
    string function = 1;
    string action = 2;
    string query = 3;
}
message response {
    string response = 1;
}


